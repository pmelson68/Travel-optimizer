```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight Optimizer - Airline Miles & Points Calculator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; min-height: 100vh; padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 30px; color: #ffd700; font-size: 2.5em; }
.search-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; margin-bottom: 30px; }
.search-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
input, select, button { padding: 10px; border: none; border-radius: 5px; font-size: 14px; }
input, select { background: white; color: #333; }
button { background: #ffd700; color: #000; font-weight: bold; cursor: pointer; }
button:hover { background: #ffed4e; }
.flights { display: grid; gap: 15px; }
.flight-card { background: rgba(255,255,255,0.05); border: 1px solid #ffd700; padding: 15px; border-radius: 8px; }
.flight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.airline { font-weight: bold; color: #ffd700; }
.price { font-size: 1.5em; color: #4ade80; }
.flight-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; font-size: 13px; margin: 10px 0; }
.detail { background: rgba(255,255,255,0.05); padding: 8px; border-radius: 4px; }
.label { color: #bbb; font-size: 11px; }
.miles-comparison { background: rgba(79, 172, 254, 0.1); padding: 10px; border-left: 3px solid #4facfe; margin-top: 10px; }
.error { background: #ff4444; padding: 10px; border-radius: 5px; margin-bottom: 20px; }
.loading { text-align: center; padding: 20px; font-size: 18px; }
.no-results { text-align: center; padding: 40px; color: #aaa; }
</style>
</head>
<body>
<div class="container">
<h1>✈️ Flight & Miles Optimizer</h1>

<div class="search-box">
<div class="search-row">
<input type="text" id="origin" placeholder="Origin (STL)" value="STL" maxlength="3">
<input type="text" id="destination" placeholder="Destination (CUN)" value="CUN" maxlength="3">
<input type="date" id="departDate" value="2025-06-18">
<input type="date" id="returnDate" value="2025-06-25">
<button onclick="searchFlights()">Search Flights</button>
</div>
</div>

<div id="error" class="error" style="display:none;"></div>
<div id="loading" class="loading" style="display:none;">Searching flights...</div>
<div id="flightsList" class="flights"></div>
<div id="noResults" class="no-results" style="display:none;">No flights found. Try different dates or airports.</div>
</div>

<script>
const VALUATIONS = {
SW: 0.0135, UA: 0.0125, AA: 0.012, DL: 0.0118,
KE: 0.014, QR: 0.0155, EK: 0.015
};

const AIRLINES = {
'G9': 'Air Arabia', 'EK': 'Emirates', 'QR': 'Qatar', 'KE': 'Korean Air',
'UA': 'United', 'AA': 'American', 'DL': 'Delta', 'SW': 'Southwest'
};

async function searchFlights() {
const origin = document.getElementById('origin').value.toUpperCase();
const destination = document.getElementById('destination').value.toUpperCase();
const departDate = document.getElementById('departDate').value;
const returnDate = document.getElementById('returnDate').value;

if (!origin || !destination || !departDate) {
showError('Please fill in all required fields');
return;
}

const [year, month, day] = departDate.split('-');
const dateFromFormatted = `${day}/${month}/${year}`;

let dateToFormatted = dateFromFormatted;
if (returnDate) {
const [ryear, rmonth, rday] = returnDate.split('-');
dateToFormatted = `${rday}/${rmonth}/${ryear}`;
}

document.getElementById('loading').style.display = 'block';
document.getElementById('flightsList').innerHTML = '';
document.getElementById('noResults').style.display = 'none';
document.getElementById('error').style.display = 'none';

try {
const url = `https://api.tequila.kiwi.com/v2/search?fly_from=${origin}&fly_to=${destination}&dateFrom=${dateFromFormatted}&dateTo=${dateToFormatted}&limit=15&partner=picky`;

const response = await fetch(url);
const data = await response.json();

document.getElementById('loading').style.display = 'none';

if (data.data && data.data.length > 0) {
displayFlights(data.data);
} else {
document.getElementById('noResults').style.display = 'block';
}
} catch (error) {
document.getElementById('loading').style.display = 'none';
showError(`Error: ${error.message}`);
}
}

function displayFlights(flights) {
const container = document.getElementById('flightsList');
container.innerHTML = '';

flights.forEach(flight => {
const airlineCode = flight.airlines[0] || 'UN';
const airlineName = AIRLINES[airlineCode] || airlineCode;
const estimatedMiles = Math.round(flight.distance / 2) || 15000;
const pointsValue = Math.round(estimatedMiles * (VALUATIONS[airlineCode] || 0.012));
const savings = Math.round(flight.price - pointsValue);

const flightCard = document.createElement('div');
flightCard.className = 'flight-card';
flightCard.innerHTML = `
<div class="flight-header">
<span class="airline">${airlineName}</span>
<span class="price">$${flight.price}</span>
</div>
<div class="flight-details">
<div class="detail">
<div class="label">Departure</div>
${new Date(flight.route[0].dTime * 1000).toLocaleTimeString()}
</div>
<div class="detail">
<div class="label">Arrival</div>
${new Date(flight.route[flight.route.length - 1].aTime * 1000).toLocaleTimeString()}
</div>
<div class="detail">
<div class="label">Duration</div>
${Math.round(flight.duration.total / 3600)}h ${Math.round((flight.duration.total % 3600) / 60)}m
</div>
<div class="detail">
<div class="label">Stops</div>
${flight.route.length - 1 === 0 ? 'Nonstop' : flight.route.length - 1}
</div>
</div>
<div class="miles-comparison">
<strong>Points Comparison:</strong><br>
💰 <strong>Pay Cash:</strong> $${flight.price}<br>
✈️ <strong>Use ${estimatedMiles.toLocaleString()} Miles:</strong> $${pointsValue} value<br>
💵 <strong>You Save:</strong> $${savings > 0 ? savings : 0} with miles
</div>
`;
container.appendChild(flightCard);
});
}

function showError(message) {
const errorDiv = document.getElementById('error');
errorDiv.textContent = message;
errorDiv.style.display = 'block';
document.getElementById('loading').style.display = 'none';
}
</script>
</body>
</html>
