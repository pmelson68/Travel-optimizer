```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight & Miles Optimizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; }
h1 { color: #ffd700; text-align: center; margin-bottom: 30px; }
.search-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
input, select { padding: 12px; background: #333; border: 1px solid #ffd700; color: #fff; border-radius: 5px; font-size: 14px; }
button { padding: 12px 30px; background: #ffd700; color: #1a1a2e; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; }
button:hover { background: #ffed4e; }
.results { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
.flight-card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; border: 1px solid #ffd700; }
.airline { font-weight: bold; color: #ffd700; font-size: 18px; }
.price { font-size: 24px; color: #00ff88; margin: 10px 0; }
.details { margin: 10px 0; font-size: 14px; }
.loading { text-align: center; color: #ffd700; font-size: 18px; }
.error { color: #ff6b6b; padding: 15px; background: rgba(255,0,0,0.1); border-radius: 5px; margin: 20px 0; }
</style>
</head>
<body>
<div class="container">
<h1>✈️ Flight & Miles Optimizer</h1>

<div class="search-box">
<div class="form-row">
<input type="text" id="from" placeholder="From (e.g., STL)" value="STL">
<input type="text" id="to" placeholder="To (e.g., CUN)" value="CUN">
<input type="date" id="depart" value="2025-06-18">
<input type="date" id="return" value="2025-06-25">
</div>
<div class="form-row">
<select id="cabin">
<option value="">All Classes</option>
<option value="economy">Economy</option>
<option value="business">Business</option>
<option value="first">First Class</option>
</select>
<button onclick="searchFlights()">🔍 Search All Airlines</button>
</div>
</div>

<div id="loading" class="loading" style="display:none;">Searching 500+ airlines worldwide...</div>
<div id="error" class="error" style="display:none;"></div>
<div id="results" class="results"></div>
</div>

<script>
async function searchFlights() {
const from = document.getElementById('from').value.toUpperCase();
const to = document.getElementById('to').value.toUpperCase();
const depart = document.getElementById('depart').value;
const cabin = document.getElementById('cabin').value;

if (!from || !to || !depart) {
alert('Please fill all fields');
return;
}

document.getElementById('loading').style.display = 'block';
document.getElementById('error').style.display = 'none';
document.getElementById('results').innerHTML = '';

try {
// Convert date format for API (dd/mm/yyyy)
const [year, month, day] = depart.split('-');
const dateFrom = `${day}/${month}/${year}`;

// Use CORS-free public endpoint
const url = `https://api.tequila.kiwi.com/v2/search?fly_from=${from}&fly_to=${to}&dateFrom=${dateFrom}&limit=50&sort=price&partner=picky`;

const response = await fetch(url);
const data = await response.json();

if (!data.data || data.data.length === 0) {
document.getElementById('error').textContent = 'No flights found. Check airport codes (use IATA codes like STL, CUN, NYC)';
document.getElementById('error').style.display = 'block';
return;
}

const flights = data.data.slice(0, 50);
let html = '';

flights.forEach(flight => {
const airline = flight.airlines[0] || 'Unknown';
const price = flight.price;
const stops = flight.route.length - 1;
const duration = Math.floor(flight.duration.total / 3600) + 'h ' + Math.floor((flight.duration.total % 3600) / 60) + 'm';

html += `
<div class="flight-card">
<div class="airline">${airline}</div>
<div class="price">$${price}</div>
<div class="details">
<strong>Duration:</strong> ${duration}<br>
<strong>Stops:</strong> ${stops}<br>
<strong>Distance:</strong> ${flight.distance} km
</div>
<button onclick="window.open('${flight.deep_link}', '_blank')" style="width: 100%; margin-top: 10px;">Book on Kiwi</button>
</div>
`;
});

document.getElementById('results').innerHTML = html;
} catch (error) {
document.getElementById('error').textContent = `Error: ${error.message}. Make sure airport codes are valid IATA codes (STL, CUN, NYC, LAX, etc.)`;
document.getElementById('error').style.display = 'block';
} finally {
document.getElementById('loading').style.display = 'none';
}
}

// Search on page load
window.onload = () => searchFlights();
</script>
</body>
</html>
```
