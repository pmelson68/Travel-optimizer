```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight & Miles Optimizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #1a1a2e; color: #fff; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; }
h1 { color: #ffd700; text-align: center; margin-bottom: 30px; font-size: 28px; }
.search-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 15px; }
input, select { padding: 10px; background: #333; border: 1px solid #ffd700; color: #fff; border-radius: 5px; font-size: 14px; }
button { background: #ffd700; color: #000; padding: 12px 30px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }
button:hover { background: #ffed4e; }
.results { margin-top: 30px; }
.flight-card { background: rgba(255,255,255,0.1); padding: 15px; margin: 10px 0; border-radius: 8px; border-left: 4px solid #ffd700; }
.flight-info { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 10px; }
.label { color: #bbb; font-size: 12px; }
.value { font-weight: bold; color: #ffd700; font-size: 16px; }
.error { color: #ff6b6b; text-align: center; padding: 20px; }
.loading { text-align: center; padding: 20px; color: #ffd700; }
</style>
</head>
<body>
<div class="container">
<h1>✈️ Flight & Airline Miles Optimizer</h1>

<div class="search-box">
<div class="form-row">
<input type="text" id="origin" placeholder="From (STL)" value="STL">
<input type="text" id="destination" placeholder="To (CUN)" value="CUN">
<input type="date" id="departDate" value="2025-06-18">
<input type="date" id="returnDate" value="2025-06-25">
</div>
<button onclick="searchFlights()">🔍 Search Flights</button>
</div>

<div id="results"></div>
</div>

<script>
const VALUATIONS = {
'SW': 0.0135, 'UA': 0.0125, 'AA': 0.012, 'DL': 0.0118,
'KE': 0.014, 'QR': 0.0155, 'EK': 0.015
};

async function searchFlights() {
const origin = document.getElementById('origin').value.toUpperCase();
const destination = document.getElementById('destination').value.toUpperCase();
const departDate = document.getElementById('departDate').value;
const returnDate = document.getElementById('returnDate').value;
const resultsDiv = document.getElementById('results');

if (!origin || !destination || !departDate) {
resultsDiv.innerHTML = '<div class="error">Please fill in all required fields</div>';
return;
}

resultsDiv.innerHTML = '<div class="loading">Searching flights...</div>';

try {
const [year, month, day] = departDate.split('-');
const dateFrom = `${day}/${month}/${year}`;
const [ry, rm, rd] = returnDate.split('-');
const dateTo = `${rd}/${rm}/${ry}`;

const url = `https://tequila-api.kiwi.com/v2/search?fly_from=${origin}&fly_to=${destination}&dateFrom=${dateFrom}&dateTo=${dateTo}&limit=10&partner=picky`;

const response = await fetch(url);
const data = await response.json();

if (!data.data || data.data.length === 0) {
resultsDiv.innerHTML = '<div class="error">No flights found. Try different dates or airports.</div>';
return;
}

let html = '<div class="results"><h2>Results:</h2>';
data.data.forEach(flight => {
const price = Math.round(flight.price);
const airline = flight.airlines[0] || 'UN';
const estimatedMiles = Math.round(Math.random() * 50000 + 10000);
const pointsValue = estimatedMiles * (VALUATIONS[airline] || 0.012);
const savings = price - pointsValue;

html += `
<div class="flight-card">
<div class="flight-info">
<div><div class="label">Airline</div><div class="value">${airline}</div></div>
<div><div class="label">Price</div><div class="value">$${price}</div></div>
<div><div class="label">Est. Miles</div><div class="value">${estimatedMiles.toLocaleString()}</div></div>
<div><div class="label">Savings</div><div class="value">$${Math.round(savings)}</div></div>
</div>
</div>
`;
});
html += '</div>';
resultsDiv.innerHTML = html;

} catch (error) {
resultsDiv.innerHTML = '<div class="error">Error: ' + error.message + '</div>';
}
}
</script>
</body>
</html>
