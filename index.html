```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight & Miles Optimizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; padding: 20px; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; }
h1 { color: #ffd700; text-align: center; margin-bottom: 30px; font-size: 32px; }
.search-box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 10px; margin-bottom: 30px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 15px; margin-bottom: 15px; }
label { display: block; font-size: 12px; color: #ffd700; margin-bottom: 5px; }
input, select { width: 100%; padding: 12px; background: #333; border: 1px solid #ffd700; color: #fff; border-radius: 5px; font-size: 14px; }
input:focus, select:focus { outline: none; border-color: #fff; background: #444; }
button { background: #ffd700; color: #1a1a2e; padding: 12px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 14px; }
button:hover { background: #ffed4e; }
.sort-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
.sort-buttons button { padding: 8px 15px; font-size: 12px; }
.results { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
.flight-card { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 8px; border: 1px solid #ffd700; }
.flight-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
.airline { font-size: 16px; font-weight: bold; color: #ffd700; }
.price { font-size: 20px; font-weight: bold; color: #00ff00; }
.flight-details { font-size: 13px; color: #ccc; margin: 10px 0; line-height: 1.6; }
.miles-value { background: rgba(255,215,0,0.1); padding: 10px; border-radius: 5px; margin-top: 10px; }
.loading { text-align: center; padding: 40px; font-size: 18px; }
.error { background: rgba(255,0,0,0.2); padding: 15px; border-radius: 5px; color: #ff6b6b; margin-bottom: 20px; }
</style>
</head>
<body>
<div class="container">
<h1>✈️ Flight & Airline Miles Optimizer</h1>

<div class="search-box">
<div class="form-row">
<div>
<label>From (Airport Code)</label>
<input type="text" id="origin" placeholder="e.g., STL" value="STL">
</div>
<div>
<label>To (Airport Code)</label>
<input type="text" id="destination" placeholder="e.g., CUN" value="CUN">
</div>
<div>
<label>Depart Date</label>
<input type="date" id="departDate" value="2025-06-18">
</div>
<div>
<label>Return Date</label>
<input type="date" id="returnDate" value="2025-06-25">
</div>
</div>
<div class="form-row">
<div>
<label>Cabin Class</label>
<select id="cabin">
<option value="economy">Economy</option>
<option value="business">Business</option>
<option value="first">First Class</option>
</select>
</div>
<div style="display: flex; align-items: flex-end;">
<button onclick="searchFlights()">🔍 Search Flights</button>
</div>
</div>
</div>

<div id="error" class="error" style="display:none;"></div>
<div id="loading" class="loading" style="display:none;">Searching flights...</div>

<div id="sortButtons" class="sort-buttons" style="display:none;">
<button onclick="sortBy('price')">💰 Sort by Price</button>
<button onclick="sortBy('airline')">✈️ Sort by Airline</button>
<button onclick="sortBy('duration')">⏱️ Sort by Duration</button>
</div>

<div id="results" class="results"></div>
</div>

<script>
const MILES_VALUATIONS = {
SW: 0.0135, UA: 0.0125, AA: 0.012, DL: 0.0118,
KE: 0.014, QR: 0.0155, EK: 0.015
};

let allFlights = [];

async function searchFlights() {
const origin = document.getElementById('origin').value.toUpperCase();
const destination = document.getElementById('destination').value.toUpperCase();
const departDate = document.getElementById('departDate').value;
const returnDate = document.getElementById('returnDate').value;
const cabin = document.getElementById('cabin').value;

if (!origin || !destination || !departDate) {
showError('Please fill in all fields');
return;
}

showLoading(true);
showError('');

try {
// Format dates for Kiwi API (dd/mm/yyyy)
const [year, month, day] = departDate.split('-');
const formattedDepart = `${day}/${month}/${year}`;
const [ry, rm, rd] = returnDate.split('-');
const formattedReturn = `${rd}/${rm}/${ry}`;

// Use CORS proxy to bypass browser restrictions
const proxyUrl = 'https://api.allorigins.win/raw?url=';
const kiwiUrl = `https://api.tequila.kiwi.com/v2/search?fly_from=${origin}&fly_to=${destination}&dateFrom=${formattedDepart}&dateTo=${formattedReturn}&limit=50&partner=picky`;

const response = await fetch(proxyUrl + encodeURIComponent(kiwiUrl));
const data = await response.json();

if (data.data && data.data.length > 0) {
allFlights = data.data.map(flight => {
const airlineCode = flight.airlines[0] || 'UNKNOWN';
const milesNeeded = Math.round(flight.distance / 2) || 25000;
const milesValue = milesNeeded * (MILES_VALUATIONS[airlineCode] || 0.012);
const savings = flight.price - milesValue;

return {
airline: airlineCode,
price: flight.price,
duration: flight.duration.total,
departure: new Date(flight.route[0].dTime * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
arrival: new Date(flight.route[flight.route.length - 1].aTime * 1000).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
stops: flight.route.length - 1,
milesNeeded: milesNeeded,
milesValue: Math.round(milesValue),
savings: Math.round(savings),
bookingUrl: flight.deep_link
};
});

displayFlights(allFlights);
document.getElementById('sortButtons').style.display = 'flex';
} else {
showError('No flights found. Check airport codes (e.g., STL, CUN, JFK)');
allFlights = [];
document.getElementById('results').innerHTML = '';
}
} catch (err) {
showError(`Error: ${err.message}. Try different airport codes.`);
console.error(err);
} finally {
showLoading(false);
}
}

function displayFlights(flights) {
const resultsDiv = document.getElementById('results');
resultsDiv.innerHTML = flights.map(flight => `
<div class="flight-card">
<div class="flight-header">
<div class="airline">${flight.airline}</div>
<div class="price">$${flight.price}</div>
</div>
<div class="flight-details">
<strong>Departure:</strong> ${flight.departure}<br>
<strong>Arrival:</strong> ${flight.arrival}<br>
<strong>Duration:</strong> ${Math.floor(flight.duration / 3600)}h ${Math.floor((flight.duration % 3600) / 60)}m<br>
<strong>Stops:</strong> ${flight.stops === 0 ? 'Non-stop' : flight.stops}
</div>
<div class="miles-value">
<strong>💰 Miles Value:</strong> ${flight.milesNeeded.toLocaleString()} miles = $${flight.milesValue}<br>
<strong>💵 You Save:</strong> $${flight.savings}
</div>
<button onclick="window.open('${flight.bookingUrl}', '_blank')" style="width: 100%; margin-top: 15px;">Book Now</button>
</div>
`).join('');
}

function sortBy(type) {
if (type === 'price') allFlights.sort((a, b) => a.price - b.price);
else if (type === 'airline') allFlights.sort((a, b) => a.airline.localeCompare(b.airline));
else if (type === 'duration') allFlights.sort((a, b) => a.duration - b.duration);
displayFlights(allFlights);
}

function showLoading(show) {
document.getElementById('loading').style.display = show ? 'block' : 'none';
}

function showError(msg) {
const errorDiv = document.getElementById('error');
if (msg) {
errorDiv.textContent = msg;
errorDiv.style.display = 'block';
} else {
errorDiv.style.display = 'none';
}
}
</script>
</body>
</html>
