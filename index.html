<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flight & Miles Optimizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
font-family: Arial, sans-serif;
background: #1a1a2e;
color: #fff;
padding: 20px;
}
.container { max-width: 1000px; margin: 0 auto; }
h1 { text-align: center; color: #ffd700; margin-bottom: 30px; }
.search-box {
background: #16213e;
padding: 20px;
border-radius: 8px;
margin-bottom: 20px;
}
input, select, button {
padding: 10px;
margin: 5px;
border: none;
border-radius: 4px;
}
button {
background: #ffd700;
color: #000;
cursor: pointer;
font-weight: bold;
}
button:hover { background: #ffed4e; }
.flight {
background: #0f3460;
padding: 15px;
margin: 10px 0;
border-radius: 8px;
border-left: 4px solid #ffd700;
}
.price { color: #ffd700; font-weight: bold; font-size: 18px; }
</style>
</head>
<body>
<div class="container">
<h1>✈️ Flight & Airline Miles Optimizer</h1>

<div class="search-box">
<input type="text" id="from" placeholder="From (e.g., STL, JFK)" value="STL">
<input type="text" id="to" placeholder="To (e.g., CUN, LAX)" value="CUN">
<input type="date" id="date" value="2025-06-18">
<button onclick="searchFlights()">Search Real Flights</button>
</div>

<div id="results"></div>
</div>

<script>
async function searchFlights() {
const from = document.getElementById('from').value.toUpperCase();
const to = document.getElementById('to').value.toUpperCase();
const date = document.getElementById('date').value;
const resultsDiv = document.getElementById('results');

resultsDiv.innerHTML = '<p>Searching real flights...</p>';

try {
const [year, month, day] = date.split('-');
const formattedDate = `${day}/${month}/${year}`;

// Real Kiwi API call (free, no auth needed)
const response = await fetch(
`https://api.tequila.kiwi.com/v2/search?fly_from=${from}&fly_to=${to}&dateFrom=${formattedDate}&dateTo=${formattedDate}&limit=15&partner=picky`
);

const data = await response.json();

if (data.data && data.data.length > 0) {
let html = '<h2>Available Flights:</h2>';
data.data.forEach(flight => {
const price = flight.price;
const airlines = flight.airlines.join(', ');
const duration = Math.floor(flight.duration.total / 3600) + 'h ' + Math.floor((flight.duration.total % 3600) / 60) + 'm';

html += `
<div class="flight">
<strong>${airlines}</strong> | ${duration} | ${flight.route.length - 1} stop(s)<br>
<span class="price">$${price}</span>
<a href="${flight.deep_link}" target="_blank" style="color: #ffd700; margin-left: 20px;">Book</a>
</div>
`;
});
resultsDiv.innerHTML = html;
} else {
resultsDiv.innerHTML = '<p style="color: #ff6b6b;">No flights found. Try different airports or dates.</p>';
}
} catch (error) {
resultsDiv.innerHTML = '<p style="color: #ff6b6b;">Error: ' + error.message + '</p>';
}
}
</script>
</body>
</html>
