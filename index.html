```html
<!DOCTYPE html>
<html>
<head>
<title>Flight Miles Optimizer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial; background: #1a1a2e; color: #fff; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; }
h1 { color: #ffd700; text-align: center; margin-bottom: 20px; }
.search-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 8px; margin-bottom: 20px; }
input, select { width: 100%; padding: 10px; margin: 5px 0; background: #333; border: 1px solid #ffd700; color: #fff; }
button { width: 100%; padding: 12px; background: #ffd700; color: #000; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
button:hover { background: #ffed4e; }
.flights { margin-top: 30px; }
.flight { background: rgba(255,255,255,0.05); padding: 15px; margin: 10px 0; border-left: 4px solid #ffd700; border-radius: 5px; }
.flight h3 { color: #ffd700; margin-bottom: 10px; }
</style>
</head>
<body>
<div class="container">
<h1>✈️ Flight & Miles Optimizer</h1>

<div class="search-box">
<input type="text" id="origin" placeholder="From (STL, NYC, LAX)" value="STL">
<input type="text" id="destination" placeholder="To (CUN, LAX, ORD)" value="CUN">
<input type="date" id="departure" value="2025-02-01">
<input type="date" id="return" value="2025-02-08">
<button onclick="searchFlights()">Search Flights</button>
<div id="error" style="color: red; margin-top: 10px;"></div>
</div>

<div class="flights" id="results"></div>
</div>

<script>
const MOCK_FLIGHTS = {
'STL-CUN': [
{ airline: 'Southwest', price: 250, miles: 15000, stops: 0 },
{ airline: 'United', price: 280, miles: 22000, stops: 1 },
{ airline: 'American', price: 265, miles: 25000, stops: 0 },
{ airline: 'Delta', price: 290, miles: 20000, stops: 1 },
{ airline: 'Qatar', price: 320, miles: 18000, stops: 1 }
],
'STL-LAX': [
{ airline: 'Southwest', price: 320, miles: 25000, stops: 0 },
{ airline: 'United', price: 350, miles: 30000, stops: 0 },
{ airline: 'American', price: 340, miles: 32000, stops: 1 },
{ airline: 'Delta', price: 330, miles: 28000, stops: 0 }
],
'STL-ORD': [
{ airline: 'Southwest', price: 150, miles: 10000, stops: 0 },
{ airline: 'United', price: 180, miles: 15000, stops: 0 },
{ airline: 'American', price: 170, miles: 16000, stops: 1 },
{ airline: 'Delta', price: 160, miles: 14000, stops: 0 }
],
'NYC-LAX': [
{ airline: 'Southwest', price: 400, miles: 35000, stops: 0 },
{ airline: 'United', price: 420, miles: 40000, stops: 0 },
{ airline: 'American', price: 410, miles: 42000, stops: 1 }
]
};

const VALUATIONS = {
'Southwest': 0.0135,
'United': 0.0125,
'American': 0.012,
'Delta': 0.0118,
'Qatar': 0.0155
};

function searchFlights() {
const origin = document.getElementById('origin').value.toUpperCase();
const destination = document.getElementById('destination').value.toUpperCase();
const key = `${origin}-${destination}`;
const error = document.getElementById('error');
const results = document.getElementById('results');

error.textContent = '';
results.innerHTML = '';

if (!MOCK_FLIGHTS[key]) {
error.textContent = `Try: ${Object.keys(MOCK_FLIGHTS).join(' or ')}`;
return;
}

const flights = MOCK_FLIGHTS[key];
let html = `<h2>Flights from ${origin} to ${destination}</h2>`;

flights.forEach(f => {
const pointsValue = (f.miles * VALUATIONS[f.airline]).toFixed(2);
const savings = (f.price - pointsValue).toFixed(2);
html += `
<div class="flight">
<h3>${f.airline}</h3>
<p><strong>Cash Price:</strong> $${f.price}</p>
<p><strong>Miles Required:</strong> ${f.miles.toLocaleString()}</p>
<p><strong>Points Value:</strong> $${pointsValue}</p>
<p><strong>You Save:</strong> $${savings} using points!</p>
<p><strong>Stops:</strong> ${f.stops === 0 ? 'Nonstop' : f.stops + ' stop(s)'}</p>
</div>
`;
});

results.innerHTML = html;
}
</script>
</body>
</html>
